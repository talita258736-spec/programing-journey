<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selektor dalam HTML</title>
    <style>
        /* Selektot Tag */
        p {
            color: blue;
        }
        /* Selektor Kelas */
        .highlight {
            background-color: yellow;
        }
        /* Selektor ID */
        #unique-section {
            border: 2px solid red;
            padding: 10px;
        }
        /* Selektor Atribut*/
        a[href] {
            text-decoration: none;
            color: green;
        }
        /* Selektor Universal */ 
        *   {
            font-family: Arial, Helvetica, sans-serif;
        } 
    
    </style>
</head>
<body>
    <h1>Contoh Penggunaan Selektor dalam HTML</h1>
    <!--Selektor Tag-->
    <p>Ini adalah paragraf yang menggunakan sektor tag &lt;p&gt;.</p>
</body>
</html>
