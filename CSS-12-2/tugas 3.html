<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:2000px;
        }

        .kiri{
            position:fixed;
            left:0;
            top:50%;
            background:red;
            color:white;
            padding:15px;
        }

        .kanan{
            position:fixed;
            right:0;
            top:50%;
            background:green;
            color:white;
            padding:15px;
        }

        .backtotop{
            position:fixed;
            top:0;
            left:0;
            background:blue;
            color:white;
            padding:10px;
            text-decoration:none;
        }
    </style>
</head>
<body>
    <a href="#atas" class="backtotop">Back To Top</a>
    <div class="kiri">Menu Kiri</div>
    <div class="kanan">Menu Kanan</div>
    <h1 id="atas">Contoh Position Fixed</h1>
    <p>Scroll ke bawah untuk melihat elemen tetap berada di posisinya.</p>
</body>
</html>
