<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top-left {
        position: fixed;
        top: 0;
        left: 0;
        background-color: yellow;
        padding: 10px;
        }

        .left {
        position: fixed;
        left: 0;
        top: 50%;
        background-color: lightblue;
        padding: 10px;
        }

        .right {
        position: fixed;
        right: 0;
        top: 50%;
        background-color: lightgreen;
        padding: 10px;
        }

        .back-top {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background-color: red;
        color: white;
        padding: 10px;
        text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="top-left">Kiri Atas</div>
    <div class="left">Kiri</div>
    <div class="right">Kanan</div>

    <a href="#" class="back-top">Back to Top</a>
</body>
</html>
