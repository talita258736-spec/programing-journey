<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            position:relative;
            width:500px;
            height:350px;
            background:lightgray;
            border:2px solid black;
        }

        .box{
            position:absolute;
            width:80px;
            height:80px;
            color:white;
            text-align:center;
            line-height:80px;
        }

        .box1{
            top:0;
            left:0;
            background:red;
        }

        .box2{
            top:0;
            right:0;
            background:blue;
        }

        .box3{
            bottom:0;
            left:0;
            background:green;
        }

        .box4{
            bottom:0;
            right:0;
            background:orange;
        }
    </style>
</head>
<body>
    <h2>Tugas Position Absolute</h2>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>
</body>
</html>
