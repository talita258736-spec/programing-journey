<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
        position: relative;
        width: 300px;
        height: 300px;
        background-color: lightgray;
        }

        .box {
        position: absolute;
        width: 80px;
        height: 80px;
        background-color: coral;
        }

        /* posisi sudut */
        .top-left {
        top: 0;
        left: 0;
        }

        .top-right {
        top: 0;
        right: 0;
        }

        .bottom-left {
        bottom: 0;
        left: 0;
        }

        .bottom-right {
        bottom: 0;
        right: 0;
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box top-left"></div>
    <div class="box top-right"></div>
    <div class="box bottom-left"></div>
    <div class="box bottom-right"></div>
</div>
</body>
</html>
