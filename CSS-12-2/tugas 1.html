<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:120px;
            height:80px;
            color:white;
            text-align:center;
            line-height:80px;
            margin-bottom:10px;
        }

        .box1{
            position:relative;
            left:50px;
            top:40px;
            background:red;
        }

        .box2{
            position:relative;
            left:100px;
            top:50px;
            background:blue;
        }

        .box3{
            position:relative;
            left:150px;
            top:60px;
            background:green;
        }
    </style>
</head>
<body>
    <h2>Tugas Position Relative</h2>
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">Box 3</div>
</body>
</html>
