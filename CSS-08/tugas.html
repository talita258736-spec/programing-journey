<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas</title>
    <style>
        h1{
            font-size: 36px;
        }
        p{
            font-size: 14pt;
        }
        .box-cm{
            width: 6cm;
            height: 3cm;
            background-color: lightblue;
            margin-bottom: 20px;
        }
        .box-persen{
            width: 50%;
            height: 100px;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1>Belajar CSS Unit</h1>
    <p>
        Ini adalah paragraf yang menggunakan satuan pt.
    </p>
    <div class="box-cm">
        Box ukuran cm
    </div>
    <div class="box-persen">
        Box ukuran %
    </div>
</body>
</html>
