<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Selector Universal */
        *{
            font-family: Arial, sans-serif;
            margin: 10px;
        }

        /* Selector Tag */
        p{
            color: blue;
            font-size: 18px;
        }

        /* Selector Class */
        .highlight{
            background-color: yellow;
            padding: 10px;
        }

        /* Selector ID */
        #kotak{
            background-color: red;
            color: white;
            padding: 15px;
            width: 250px;
        }
    </style>
</head>
<body>
    <h1>Contoh Selector CSS</h1>

    <!-- Selector Tag -->
    <p>Ini adalah paragraf menggunakan selector tag.</p>

    <!-- Selector Class -->
    <p class="highlight">
        Ini adalah paragraf menggunakan selector class.
    </p>

    <!-- Selector ID -->
    <div id="kotak">
        Ini adalah contoh selector ID.
    </div>
</body>
</html>
